name: CI/CD - Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  rollout:
    name: Rollout
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Patch da imagem no deployment
        env:
          REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          IMAGE="$REGISTRY_USER/mundo-da-lua-crm-core:sha-${GITHUB_SHA:0:7}"
          echo "Aplicando imagem: $IMAGE"
          kubectl set image deployment/mundo-da-lua-crm-core \
            mundo-da-lua-crm-core=$IMAGE \
            -n mundo-da-lua-crm-prd
          kubectl rollout status deployment/mundo-da-lua-crm-core \
            -n mundo-da-lua-crm-prd --timeout=120s
