name: PR Validation - Dev

on:
  pull_request:
    branches:
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore MyCRM.sln

      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k="${{ secrets.SONAR_PROJECT_KEY }}" \
            /d:sonar.host.url="https://svc-sonar.mainfy.app" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.pullrequest.key="${{ github.event.pull_request.number }}" \
            /d:sonar.pullrequest.branch="${{ github.head_ref }}" \
            /d:sonar.pullrequest.base="${{ github.base_ref }}"

      - name: Build
        run: dotnet build MyCRM.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MyCRM.sln --no-build --configuration Release

      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
