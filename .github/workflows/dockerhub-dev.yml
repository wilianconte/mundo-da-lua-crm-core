name: CI/CD - Development

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=dev
            type=sha,format=short,prefix=dev-

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=dev
            type=sha,format=short,prefix=dev-

      - name: Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capturar imagem com SHA
        id: image
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep "dev-" | head -1)
          echo "value=$SHA_TAG" >> $GITHUB_OUTPUT

  rollout:
    name: Rollout
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Patch da imagem no deployment
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          kubectl set image deployment/mundo-da-lua-crm-core \
            mundo-da-lua-crm-core=${{ needs.push.outputs.image }} \
            -n mundo-da-lua-crm
          kubectl rollout status deployment/mundo-da-lua-crm-core \
            -n mundo-da-lua-crm --timeout=120s
