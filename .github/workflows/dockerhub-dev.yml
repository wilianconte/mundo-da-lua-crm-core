name: CI/CD - Development

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=dev
            type=sha,format=short,prefix=dev-

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-core
          tags: |
            type=raw,value=dev
            type=sha,format=short,prefix=dev-

      - name: Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  schema-export:
    name: Export GraphQL Schema
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore MyCRM.sln

      - name: Build
        run: dotnet build MyCRM.sln --no-restore --configuration Release

      - name: Export schema
        run: |
          dotnet run \
            --project "1 - Gateway/MundoDaLua.GraphQL/MyCRM.GraphQL.csproj" \
            --no-build \
            --no-launch-profile \
            --configuration Release \
            -- --export-schema --output "$GITHUB_WORKSPACE/contracts/schema.graphql"

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphql-schema-dev
          path: contracts/schema.graphql
          retention-days: 90

      - name: Commit schema to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/schema.graphql
          git diff --staged --quiet && echo "Schema sem alterações." && exit 0
          git commit -m "chore: atualizar contracts/schema.graphql [skip ci]"
          git push

  rollout:
    name: Rollout
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Patch da imagem no deployment
        env:
          REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          IMAGE="$REGISTRY_USER/mundo-da-lua-crm-core:dev-${GITHUB_SHA:0:7}"
          echo "Aplicando imagem: $IMAGE"
          kubectl set image deployment/mundo-da-lua-crm-core \
            mundo-da-lua-crm-core=$IMAGE \
            -n mundo-da-lua-crm
          kubectl rollout status deployment/mundo-da-lua-crm-core \
            -n mundo-da-lua-crm --timeout=120s
